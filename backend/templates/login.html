{% extends "base_auth.html" %}
{% block title %}Sign in — Sentinel AI{% endblock %}
{% block content %}
<div class="auth-sub">Sign in to your Sentinel AI account</div>

<form id="loginForm" autocomplete="on">
  <div class="field">
    <label class="field-label" for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required>
  </div>
  <div class="field">
    <label class="field-label" for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
  </div>
  <button type="submit" class="btn btn-primary auth-btn" id="loginBtn">Sign in</button>
  <div class="field-error" id="errMsg"></div>
  <div class="callout" id="successMsg" style="display:none;margin-top:var(--sp-3)">
    <svg class="icon" aria-hidden="true"><use href="#i-check"></use></svg><div id="successText"></div>
  </div>
</form>

<div class="auth-links">
  <a href="/forgot-password">Forgot password?</a>
  <a href="/signup">Create an account</a>
</div>

{% endblock %}
{% block extra_scripts %}
<script src="{{ url_for('static_files', filename='js/login.js') }}"></script>
{% endblock %}
