<!DOCTYPE html>
<html lang="en" data-shell="auth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Sentinel AI{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static_files', filename='css/foundation.css') }}">
<link rel="stylesheet" href="{{ url_for('static_files', filename='css/components.css') }}">
<link rel="stylesheet" href="{{ url_for('static_files', filename='css/shells.css') }}">
<style>
  .auth-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--sp-5); }
  .auth-brand { display: inline-flex; align-items: center; gap: 9px; font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; color: var(--text); margin-bottom: var(--sp-6); }
  .auth-brand .mark { width: 26px; height: 26px; color: var(--cyan); }
  .auth-card { width: 100%; max-width: 400px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-l); box-shadow: var(--shadow-pop); padding: var(--sp-6); }
  .auth-sub { color: var(--text-muted); font-size: var(--fs-sm); margin-bottom: var(--sp-5); }
  .auth-btn { width: 100%; justify-content: center; margin-top: 4px; }
  .auth-links { display: flex; justify-content: space-between; margin-top: var(--sp-4); font-size: var(--fs-sm); color: var(--text-muted); }
  .auth-back { display: block; text-align: center; margin-top: var(--sp-5); font-size: var(--fs-sm); color: var(--text-muted); }
  .auth-back:hover { color: var(--cyan); }
  .demo-hint { margin-top: var(--sp-5); padding: var(--sp-3) var(--sp-4); background: var(--panel-inset); border: 1px dashed var(--border); border-radius: var(--radius-s); font-size: var(--fs-xs); color: var(--text-muted); line-height: 1.7; }
  .demo-hint b { color: var(--text); font-family: var(--font-mono); }
  .demo-hint .role-row { display: flex; justify-content: space-between; font-family: var(--font-mono); }
</style>
{% block extra_style %}{% endblock %}
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
{% include "partials/_icons.html" %}
<div class="auth-page" id="main">
  <a href="/" class="auth-brand">
    <svg class="mark" aria-hidden="true"><use href="#i-shield"></use></svg>
    Sentinel<span class="brand-accent" style="color:var(--cyan)">AI</span>
  </a>
  <div class="auth-card">
    {% block content %}{% endblock %}
  </div>
  <a href="/" class="auth-back">← Back to home</a>
</div>

<div id="toast-region" aria-live="polite"></div>
<script src="{{ url_for('static_files', filename='js/core/ui.js') }}"></script>
<script src="{{ url_for('static_files', filename='js/api.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
