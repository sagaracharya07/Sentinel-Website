<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Sentinel AI{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static_files', filename='css/styles.css') }}">
<style>
  body{min-height:100vh;display:flex;flex-direction:column}
  .login-wrap{
    flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;
  }
  .login-card{
    width:100%;max-width:400px;background:var(--paper-2);border:1px solid var(--paper-line);
    border-radius:var(--radius-l);box-shadow:var(--shadow-2);padding:36px 32px;position:relative;z-index:2;
  }
  .login-brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:800;
    color:var(--paper-text);font-size:1.1rem;letter-spacing:.04em;margin-bottom:6px}
  .login-brand .dot{width:9px;height:9px;border-radius:2px;background:var(--scan);box-shadow:0 0 14px 2px var(--scan)}
  .login-brand .brand-ai{color:var(--scan)}
  .login-sub{color:var(--paper-muted);font-size:.88rem;margin-bottom:28px}
  label.field-label{display:block;font-family:var(--mono);font-size:.72rem;text-transform:uppercase;
    letter-spacing:.05em;color:var(--paper-muted);margin-bottom:6px;font-weight:600}
  .field{margin-bottom:18px}
  input[type=text], input[type=password], input[type=email]{
    width:100%;border:1px solid var(--paper-line);border-radius:var(--radius-s);
    padding:12px 14px;font-family:var(--body);font-size:.92rem;background:var(--paper-1);color:var(--paper-text);
  }
  input:focus{outline:none;border-color:var(--scan);background:var(--paper-2)}
  .login-btn{width:100%;justify-content:center;margin-top:6px}
  .err-msg{color:var(--threat);font-size:.82rem;font-family:var(--mono);margin-top:14px;display:none;
    background:var(--threat-bg);border:1px solid var(--threat-line);border-radius:var(--radius-s);padding:10px 12px}
  .err-msg.show{display:block}
  .success-msg{color:var(--safe-text);font-size:.82rem;font-family:var(--mono);margin-top:14px;display:none;
    background:var(--safe-bg);border:1px solid var(--safe-line);border-radius:var(--radius-s);padding:10px 12px}
  .success-msg.show{display:block}
  .demo-hint{
    margin-top:24px;padding:14px 16px;background:var(--paper-1);border:1px dashed var(--paper-line);
    border-radius:var(--radius-s);font-size:.78rem;color:var(--paper-muted);line-height:1.7;
  }
  .demo-hint b{color:var(--paper-text);font-family:var(--mono)}
  .demo-hint .role-row{display:flex;justify-content:space-between;font-family:var(--mono)}
  .auth-links{display:flex;justify-content:space-between;margin-top:14px;font-size:.82rem}
  .back-link{display:block;text-align:center;margin-top:18px;font-size:.82rem;color:var(--paper-muted)}
  .back-link:hover{color:var(--scan)}
</style>
{% block extra_style %}{% endblock %}
</head>
<body>

<div class="circuit-bg app-mask" style="position:fixed;inset:0;z-index:0"></div>

<div class="login-wrap">
  <div class="login-card hud-frame">
    <div class="login-brand"><span class="dot"></span> Sentinel<span class="brand-ai">AI</span></div>
    {% block content %}{% endblock %}
    <a href="/" class="back-link">← Back to overview</a>
  </div>
</div>

<script src="{{ url_for('static_files', filename='js/api.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
