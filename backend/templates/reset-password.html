{% extends "base_auth.html" %}
{% block title %}Reset password — Sentinel AI{% endblock %}
{% block content %}
<div class="auth-sub">Choose a new password.</div>

<form id="resetForm" autocomplete="off">
  <div class="field">
    <label class="field-label" for="password">New password</label>
    <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8">
  </div>
  <button type="submit" class="btn btn-primary auth-btn" id="resetBtn">Reset password</button>
  <div class="field-error" id="errMsg"></div>
  <div class="callout" id="successMsg" style="display:none;margin-top:var(--sp-3)">
    <svg class="icon" aria-hidden="true"><use href="#i-check"></use></svg><div id="successText"></div>
  </div>
</form>
{% endblock %}
{% block extra_scripts %}
<script src="{{ url_for('static_files', filename='js/reset-password.js') }}"></script>
{% endblock %}
