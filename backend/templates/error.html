<!DOCTYPE html>
<html lang="en" data-shell="error">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ code }} — {{ title }} · Sentinel AI</title>
<link rel="stylesheet" href="{{ url_for('static_files', filename='css/foundation.css') }}">
<link rel="stylesheet" href="{{ url_for('static_files', filename='css/components.css') }}">
<style>
  .err-page { min-height: 100vh; display: grid; place-items: center; padding: var(--sp-5); }
  .err-card { max-width: 560px; width: 100%; text-align: center; }
  .err-code {
    font-family: var(--font-display); font-weight: 700; line-height: 1;
    font-size: clamp(4rem, 16vw, 8rem);
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .err-brand { display: inline-flex; align-items: center; gap: 9px; font-family: var(--font-display); font-weight: 700; margin-bottom: var(--sp-6); color: var(--text); }
  .err-brand .mark { width: 26px; height: 26px; color: var(--cyan); }
  .err-card h1 { font-size: var(--fs-h2); margin-top: var(--sp-2); }
  .err-card p { color: var(--text-muted); margin-top: var(--sp-3); }
  .err-actions { display: flex; gap: var(--sp-3); justify-content: center; flex-wrap: wrap; margin-top: var(--sp-6); }
</style>
</head>
<body>
<div class="err-page">
  <div class="err-card">
    <a href="/" class="err-brand">
      <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3l7 3v5c0 4.4-3 8.3-7 9.5C8 19.3 5 15.4 5 11V6l7-3z"/><path d="M9.2 12l1.9 1.9 3.7-3.8"/>
      </svg>
      Sentinel<span style="color:var(--cyan)">AI</span>
    </a>
    <div class="err-code" aria-hidden="true">{{ code }}</div>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <div class="err-actions">
      <a href="/" class="btn btn-primary">Back to home</a>
      {% if show_signin %}<a href="/login" class="btn btn-ghost">Sign in</a>{% endif %}
    </div>
  </div>
</div>
</body>
</html>
