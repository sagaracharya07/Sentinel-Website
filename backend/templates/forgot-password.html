{% extends "base_auth.html" %}
{% block title %}Forgot password — Sentinel AI{% endblock %}
{% block content %}
<div class="auth-sub">Enter your account email and we'll send a password reset link.</div>

<form id="forgotForm" autocomplete="on">
  <div class="field">
    <label class="field-label" for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="email" required>
  </div>
  <button type="submit" class="btn btn-primary auth-btn" id="forgotBtn">Send reset link</button>
  <div class="field-error" id="errMsg"></div>
  <div class="callout" id="successMsg" style="display:none;margin-top:var(--sp-3)">
    <svg class="icon" aria-hidden="true"><use href="#i-check"></use></svg><div id="successText"></div>
  </div>
</form>

<div class="auth-links" style="justify-content:center">
  <span><a href="/login">Back to sign in</a></span>
</div>
{% endblock %}
{% block extra_scripts %}
<script src="{{ url_for('static_files', filename='js/forgot-password.js') }}"></script>
{% endblock %}
