{% extends "base_auth.html" %}
{% block title %}Forgot password — Sentinel AI{% endblock %}
{% block content %}
    <div class="login-sub">Enter the email on your account and we'll send a reset link.</div>

    <form id="forgotForm" autocomplete="on">
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <button type="submit" class="btn btn-primary login-btn" id="forgotBtn">Send reset link</button>
      <div class="err-msg" id="errMsg"></div>
      <div class="success-msg" id="successMsg"></div>
    </form>

    <div class="auth-links" style="justify-content:center">
      <a href="/login.html">← Back to log in</a>
    </div>
{% endblock %}
{% block extra_scripts %}
<script src="{{ url_for('static_files', filename='js/forgot-password.js') }}"></script>
{% endblock %}
