services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_dev_password
      POSTGRES_DB: sentinel
    volumes:
      - sentinel_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    env_file: [.env.docker]
    volumes:
      # Shared with worker/beat -- retrain_task (tasks.py) writes new model
      # versions to ml/artifacts/ from the worker container; without a
      # shared volume here, web/worker/beat each get their own independent
      # copy baked into the image and a retrained model would silently
      # never reach the process serving live traffic. Found by actually
      # running a retrain job end-to-end, not by inspection.
      - sentinel_ml_artifacts:/app/backend/ml/artifacts
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/public/demo-scan"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # `python -m celery` (not the bare `celery` console-script) -- the
    # console-script entry point doesn't add the working directory to
    # sys.path, so `from app import app` inside tasks.py fails with
    # ModuleNotFoundError under the bare command. `python -m` does add
    # cwd, same as how gunicorn resolves wsgi:app for the web service.
    command: python -m celery -A celery_app worker --loglevel=info
    env_file: [.env.docker]
    volumes:
      - sentinel_ml_artifacts:/app/backend/ml/artifacts
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  # Exactly one beat instance -- it's the single scheduler that enqueues
  # purge/mailbox-sync jobs (see celery_app.py). Never scale this service;
  # scale `worker` instead if job throughput needs to grow.
  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -m celery -A celery_app beat --loglevel=info
    env_file: [.env.docker]
    volumes:
      - sentinel_ml_artifacts:/app/backend/ml/artifacts
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  sentinel_pgdata:
  sentinel_ml_artifacts:
