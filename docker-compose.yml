services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_dev_password
      POSTGRES_DB: sentinel
    volumes:
      - sentinel_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage, standing in for whatever real provider
  # (AWS S3, Cloudflare R2, Backblaze B2) gets used on Render -- see
  # backend/ml/artifact_store.py. Deliberately NOT a shared Docker volume
  # between web/worker/beat: Render's separate services don't get one
  # either, and a volume-based fix here would hide that gap again instead
  # of testing the mechanism that actually has to work in production.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sentinel-dev
      MINIO_ROOT_PASSWORD: sentinel-dev-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sentinel_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Fake SMTP catcher for local verification of the outbound-email flow
  # (signup verification, password reset, contact form -- see
  # backend/mail/email_client.py) without needing real provider
  # credentials. No auth, no TLS -- see MAIL_USE_TLS/MAIL_USE_AUTH in
  # .env.docker.example. Web UI at http://localhost:8025, REST API at
  # /api/v1/messages for scripted verification.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    env_file: [.env.docker]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      mailpit: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/public/demo-scan"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # `python -m celery` (not the bare `celery` console-script) -- the
    # console-script entry point doesn't add the working directory to
    # sys.path, so `from app import app` inside tasks.py fails with
    # ModuleNotFoundError under the bare command. `python -m` does add
    # cwd, same as how gunicorn resolves wsgi:app for the web service.
    command: python -m celery -A celery_app worker --loglevel=info
    env_file: [.env.docker]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      mailpit: { condition: service_healthy }

  # Exactly one beat instance -- it's the single scheduler that enqueues
  # purge/mailbox-sync jobs (see celery_app.py). Never scale this service;
  # scale `worker` instead if job throughput needs to grow.
  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -m celery -A celery_app beat --loglevel=info
    env_file: [.env.docker]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      mailpit: { condition: service_healthy }

volumes:
  sentinel_pgdata:
  sentinel_minio_data:
