services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_dev_password
      POSTGRES_DB: sentinel
    volumes:
      - sentinel_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    env_file: [.env.docker]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/public/demo-scan"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A celery_app worker --loglevel=info
    env_file: [.env.docker]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  # Exactly one beat instance -- it's the single scheduler that enqueues
  # purge/mailbox-sync jobs (see celery_app.py). Never scale this service;
  # scale `worker` instead if job throughput needs to grow.
  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A celery_app beat --loglevel=info
    env_file: [.env.docker]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  sentinel_pgdata:
