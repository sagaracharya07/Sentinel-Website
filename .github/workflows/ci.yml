name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_ci_password
          POSTGRES_DB: sentinel
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sentinel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SENTINEL_ENV: development
      DATABASE_URL: postgresql://sentinel:sentinel_ci_password@localhost:5432/sentinel
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      # Sanity-checks the migration chain against a real Postgres instance
      # (not just SQLite, which is more forgiving about schema changes) --
      # this is what actually catches a broken migration before it reaches
      # a real deploy, not just a syntax check.
      - name: Apply Alembic migrations against Postgres
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest -v
