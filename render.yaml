# Render Blueprint -- see https://render.com/docs/blueprint-spec
# Deploys: web service (gunicorn), celery worker, celery beat (single
# instance, never scaled -- see docker-compose.yml's comment on the same
# point), managed Postgres, managed Redis (Key Value).
#
# All three backend services share backend/Dockerfile (repo-root build
# context, same as docker-compose.yml) so there's exactly one image
# definition to keep in sync, not three.

databases:
  - name: sentinel-db
    plan: starter
    databaseName: sentinel
    user: sentinel

services:
  - type: redis
    name: sentinel-redis
    plan: starter
    ipAllowList: [] # only reachable from other services in this Render account

  - type: web
    name: sentinel-web
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/public/demo-scan
    envVars:
      - key: SENTINEL_ENV
        value: production
      - key: SENTINEL_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase: { name: sentinel-db, property: connectionString }
      - key: REDIS_URL
        fromService: { name: sentinel-redis, type: redis, property: connectionString }
      # Live-mailbox integration is opt-in: set MAILBOX_HOST/USERNAME/PASSWORD
      # in the Render dashboard for this service if you want it connected to
      # a real inbox (see backend/.env.example) -- left unset here since
      # committing even placeholder mailbox creds to a blueprint is bad
      # practice for something this sensitive.
      #
      # Required for retraining to actually reach this service: web,
      # sentinel-celery-worker, and sentinel-celery-beat are separate
      # Render services with separate disks (unlike docker-compose, which
      # shares one Docker host) -- ml/artifact_store.py is what lets a
      # model trained on the worker become visible here. Create a bucket
      # with any S3-compatible provider (AWS S3, Cloudflare R2, Backblaze
      # B2) and set the same four values on ALL THREE services below via
      # the Render dashboard (sync: false = not committed here, set
      # manually):
      - key: ARTIFACT_STORE_BUCKET
        sync: false
      - key: ARTIFACT_STORE_ENDPOINT_URL
        sync: false # omit/leave blank for real AWS S3; required for R2/B2
      - key: ARTIFACT_STORE_ACCESS_KEY_ID
        sync: false
      - key: ARTIFACT_STORE_SECRET_ACCESS_KEY
        sync: false
      # Outbound email (signup verification, password reset, contact form
      # -- backend/mail/email_client.py). Only sentinel-web sends email;
      # worker/beat never call send_email(), so these don't need to be
      # duplicated onto those two services. Leaving MAIL_HOST unset here
      # is safe -- see email_client.py's dev-mode console fallback -- but
      # means no real email goes out until it's configured.
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: SENTINEL_PUBLIC_BASE_URL
        sync: false # the real https://... URL of this deployment, used to build email links
      - key: CONTACT_RECIPIENT_EMAIL
        sync: false

  - type: worker
    name: sentinel-celery-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    # python -m celery, not the bare console-script -- see the matching
    # comment in docker-compose.yml for why (ModuleNotFoundError: no
    # module named 'app' otherwise).
    dockerCommand: python -m celery -A celery_app worker --loglevel=info
    plan: starter
    envVars:
      - key: SENTINEL_ENV
        value: production
      - key: SENTINEL_SECRET_KEY
        sync: false # set to the same generated value as sentinel-web
      - key: DATABASE_URL
        fromDatabase: { name: sentinel-db, property: connectionString }
      - key: REDIS_URL
        fromService: { name: sentinel-redis, type: redis, property: connectionString }
      - key: ARTIFACT_STORE_BUCKET
        sync: false # same bucket as sentinel-web
      - key: ARTIFACT_STORE_ENDPOINT_URL
        sync: false
      - key: ARTIFACT_STORE_ACCESS_KEY_ID
        sync: false
      - key: ARTIFACT_STORE_SECRET_ACCESS_KEY
        sync: false

  - type: worker
    name: sentinel-celery-beat
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    dockerCommand: python -m celery -A celery_app beat --loglevel=info
    plan: starter
    numInstances: 1 # exactly one -- see the beat comment in docker-compose.yml
    envVars:
      - key: SENTINEL_ENV
        value: production
      - key: SENTINEL_SECRET_KEY
        sync: false # set to the same generated value as sentinel-web
      - key: DATABASE_URL
        fromDatabase: { name: sentinel-db, property: connectionString }
      - key: REDIS_URL
        fromService: { name: sentinel-redis, type: redis, property: connectionString }
