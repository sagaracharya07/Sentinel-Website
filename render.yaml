# Render Blueprint -- see https://render.com/docs/blueprint-spec
#
# FREE-TIER DEPLOY: a single free Web Service only. No Postgres, no Redis, no
# Celery worker/beat -- those require paid Render plans (see render.full.yaml
# for that config, preserved for when a paid upgrade makes sense).
#
# What this trades away, and why it's still safe to run:
#   - No managed Postgres -> falls back to a local SQLite file
#     (db_config.py's documented dev fallback). Render's free-tier disk is
#     EPHEMERAL: the SQLite file is wiped on every restart/redeploy/scale-to-
#     zero wake-up. Fine for a demo; do not rely on data surviving between
#     sessions.
#   - No Redis -> flask-limiter falls back to in-memory rate limiting
#     (already coded for this, see app.py's comment on RATELIMIT_STORAGE_URI).
#   - No Celery worker/beat -> no background Gmail auto-sync on a schedule,
#     and POST /api/admin/retrain returns a 503 (job queue unreachable)
#     instead of queuing -- both already handled gracefully in the code, not
#     new failure modes. Gmail's manual "Scan Now" button still works: it
#     calls sync.sync_connection() directly in the request, not through
#     Celery.
#   - SENTINEL_ENV is intentionally NOT "production": app.py refuses to boot
#     in production mode without a real DATABASE_URL (db_config.py), and
#     production mode would also disable the demo-account auto-seed that's
#     the only way to get a login on a free instance with no shell access
#     (free services don't support SSH -- see Render's dashboard copy).
#     Leaving it as "development" is what makes admin/admin123 and
#     user/user123 available immediately after first deploy.

services:
  - type: web
    name: sentinel-web
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: SENTINEL_ENV
        value: development
      - key: SENTINEL_SECRET_KEY
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      # --- Gmail OAuth (optional; leave unset to demo without it) ---
      # See docs/GMAIL_SETUP.md. Without these, Connected Mailboxes just
      # shows "Google OAuth is not configured" instead of erroring.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false # https://<this-service>.onrender.com/api/admin/gmail/callback
      - key: GMAIL_MONITORING_MODE
        value: polling
      - key: EML_MAX_BYTES
        value: "5242880"
      - key: IMAP_ENABLED
        value: "false"
      # Outbound email (verification/reset/contact) -- unset is safe, see
      # mail/email_client.py's dev-mode console fallback; no real email goes
      # out until these are set.
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: SENTINEL_PUBLIC_BASE_URL
        sync: false # the real https://...onrender.com URL, used in emailed links
      - key: CONTACT_RECIPIENT_EMAIL
        sync: false
      - key: LOG_LEVEL
        value: INFO
